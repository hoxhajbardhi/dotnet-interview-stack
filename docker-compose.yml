services:
  postgres:
    image: postgres:16-alpine
    container_name: interview-stack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: interview_stack
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d interview_stack"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: