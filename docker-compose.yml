services:
  postgres:
    image: postgres:16-alpine
    container_name: interview-stack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: interview_stack
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d interview_stack"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interview-stack-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Database=Host=postgres;Port=5432;Database=interview_stack;Username=dev;Password=dev
      - JwtSettings__Secret=dev-secret-key-minimum-32-characters-long!
      - JwtSettings__Issuer=dotnet-interview-stack
      - JwtSettings__Audience=dotnet-interview-stack-users
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data: